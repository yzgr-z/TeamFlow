<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamFlow - 登录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    border-radius: 0 !important;
  }

  :root {
    --bg-primary: #0A0A0A;
    --bg-card: #141414;
    --bg-input: #0F0F0F;
    --border: #333333;
    --border-focus: #0891B2;
    --primary: #0891B2;
    --primary-hover: #0E7490;
    --accent: #67E8F9;
    --text-primary: #FAFAFA;
    --text-secondary: #A3A3A3;
    --text-muted: #737373;
    --shadow-offset: 2px 2px 0px 0px rgba(0,0,0,0.15);
    --shadow-offset-lg: 4px 4px 0px 0px rgba(0,0,0,0.2);
    --font-display: 'Geist', 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-body: 'Plus Jakarta Sans', 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: var(--font-body);
    background-color: var(--bg-primary);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ===== LAYOUT ===== */
  .login-page {
    display: flex;
    height: 100vh;
    width: 100vw;
    position: relative;
    overflow: hidden;
  }

  /* ===== BACKGROUND GRID ===== */
  .bg-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* ===== FLOATING LIGHT SPOTS ===== */
  .light-spot {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }

  .light-spot-1 {
    width: 400px;
    height: 400px;
    background: var(--primary);
    top: -100px;
    left: -100px;
    animation: float1 12s ease-in-out infinite;
  }

  .light-spot-2 {
    width: 300px;
    height: 300px;
    background: var(--accent);
    bottom: -80px;
    right: 20%;
    animation: float2 15s ease-in-out infinite;
  }

  .light-spot-3 {
    width: 200px;
    height: 200px;
    background: var(--primary);
    top: 40%;
    right: -50px;
    animation: float3 10s ease-in-out infinite;
  }

  .light-spot-4 {
    width: 250px;
    height: 250px;
    background: #164E63;
    bottom: 10%;
    left: 30%;
    animation: float4 18s ease-in-out infinite;
  }

  @keyframes float1 {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(60px, 40px); }
    66% { transform: translate(-30px, 80px); }
  }

  @keyframes float2 {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(-50px, -30px); }
    66% { transform: translate(40px, -60px); }
  }

  @keyframes float3 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-40px, 50px); }
  }

  @keyframes float4 {
    0%, 100% { transform: translate(0, 0); }
    25% { transform: translate(30px, -40px); }
    75% { transform: translate(-20px, 30px); }
  }

  /* ===== LEFT PANEL - BRAND ===== */
  .brand-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
    position: relative;
    z-index: 1;
    min-width: 0;
  }

  .brand-panel .overline {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--primary);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-panel .overline::before {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: var(--primary);
  }

  .brand-title {
    font-family: var(--font-display);
    font-size: 72px;
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -3px;
    color: var(--text-primary);
    margin-bottom: 28px;
  }

  .brand-title .accent-char {
    color: var(--primary);
  }

  .brand-tagline {
    font-family: var(--font-body);
    font-size: 17px;
    font-weight: 400;
    line-height: 1.7;
    color: var(--text-secondary);
    max-width: 420px;
    margin-bottom: 48px;
  }

  .brand-stats {
    display: flex;
    gap: 48px;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-value {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -1px;
  }

  .stat-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ===== RIGHT PANEL - LOGIN ===== */
  .login-panel {
    width: 560px;
    min-width: 560px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    padding: 40px;
  }

  .login-card {
    width: 400px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 40px;
    box-shadow: var(--shadow-offset-lg);
    position: relative;
    animation: cardEntrance 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
    transform: translateY(16px);
  }

  @keyframes cardEntrance {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ===== LOGO ===== */
  .logo-container {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 36px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text-primary);
  }

  .logo-text .dot {
    color: var(--primary);
  }

  /* ===== FORM ===== */
  .form-title {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .form-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 32px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    width: 18px;
    height: 18px;
    color: var(--text-muted);
    pointer-events: none;
    transition: color 0.2s;
    z-index: 1;
  }

  .form-input {
    width: 100%;
    height: 48px;
    padding: 0 14px 0 44px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 400;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: inset 1px 1px 3px rgba(0,0,0,0.3);
  }

  .form-input::placeholder {
    color: var(--text-muted);
    font-weight: 300;
  }

  .form-input:focus {
    border-color: var(--border-focus);
    box-shadow: inset 1px 1px 3px rgba(0,0,0,0.3), 0 0 0 3px rgba(8,145,178,0.15);
  }

  .form-input:focus ~ .input-icon,
  .form-input:focus + .input-icon {
    color: var(--primary);
  }

  .input-wrapper:focus-within .input-icon {
    color: var(--primary);
  }

  .password-toggle {
    position: absolute;
    right: 12px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s;
    z-index: 1;
  }

  .password-toggle:hover {
    color: var(--text-secondary);
  }

  .password-toggle svg {
    width: 18px;
    height: 18px;
  }

  /* ===== LOGIN BUTTON ===== */
  .login-btn {
    width: 100%;
    height: 50px;
    background: var(--primary);
    border: none;
    color: #fff;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    box-shadow: var(--shadow-offset);
    transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .login-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0px 0px rgba(0,0,0,0.25);
    background: var(--primary-hover);
  }

  .login-btn:active {
    transform: translate(1px, 1px);
    box-shadow: 0px 0px 0px 0px rgba(0,0,0,0.15);
  }

  /* ===== QQ LOGIN ===== */
  .qq-login {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 24px;
    padding: 10px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    transition: border-color 0.2s, color 0.2s;
    text-decoration: none;
  }

  .qq-login:hover {
    border-color: var(--text-muted);
    color: var(--text-primary);
  }

  .qq-login .qq-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    object-fit: contain;
  }

  /* ===== DIVIDER ===== */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 24px 0;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider span {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }

  /* ===== BOTTOM LINKS ===== */
  .bottom-links {
    display: flex;
    justify-content: space-between;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .bottom-links a {
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    font-weight: 400;
    transition: color 0.2s;
    cursor: pointer;
  }

  .bottom-links a:hover {
    color: var(--accent);
  }

  .bottom-links a.register-link {
    color: var(--primary);
    font-weight: 500;
  }

  .bottom-links a.register-link:hover {
    color: var(--accent);
  }

  /* ===== DECORATIVE ELEMENTS ===== */
  .corner-mark {
    position: absolute;
    width: 12px;
    height: 12px;
    border-color: var(--primary);
    opacity: 0.3;
  }

  .corner-mark.tl {
    top: -1px;
    left: -1px;
    border-top: 1px solid;
    border-left: 1px solid;
  }

  .corner-mark.br {
    bottom: -1px;
    right: -1px;
    border-bottom: 1px solid;
    border-right: 1px solid;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 1100px) {
    .brand-panel {
      display: none;
    }
    .login-panel {
      width: 100%;
      min-width: unset;
    }
  }

  @media (max-width: 480px) {
    .login-card {
      width: 100%;
      padding: 28px;
    }
    .login-panel {
      padding: 20px;
    }
  }

  /* ===== SUBTLE SCAN LINE ===== */
  .scan-line {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    opacity: 0.06;
    z-index: 0;
    animation: scanMove 8s linear infinite;
    pointer-events: none;
  }

  @keyframes scanMove {
    0% { top: -1px; }
    100% { top: 100%; }
  }

  /* ===== VERSION TAG ===== */
  .version-tag {
    position: fixed;
    bottom: 20px;
    left: 24px;
    font-size: 10px;
    color: var(--text-muted);
    opacity: 0.4;
    font-family: var(--font-display);
    letter-spacing: 1px;
    z-index: 1;
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="scan-line"></div>

<div class="light-spot light-spot-1"></div>
<div class="light-spot light-spot-2"></div>
<div class="light-spot light-spot-3"></div>
<div class="light-spot light-spot-4"></div>

<div class="login-page">

  <!-- LEFT: Brand Panel -->
  <div class="brand-panel">
    <div class="overline">Collaboration Platform</div>
    <h1 class="brand-title">
      Team<span class="accent-char">Flow</span>
    </h1>
    <p class="brand-tagline">
      为高效团队打造的协作平台。<br>
      连接工作流，释放创造力，<br>
      让每一次协作都流畅自如。
    </p>
    <div class="brand-stats">
      <div class="stat-item">
        <span class="stat-value">12K+</span>
        <span class="stat-label">活跃团队</span>
      </div>
      <div class="stat-item">
        <span class="stat-value">99.9%</span>
        <span class="stat-label">服务可用性</span>
      </div>
      <div class="stat-item">
        <span class="stat-value">50ms</span>
        <span class="stat-label">平均响应</span>
      </div>
    </div>
  </div>

  <!-- RIGHT: Login Panel -->
  <div class="login-panel">
    <div class="login-card">
      <div class="corner-mark tl"></div>
      <div class="corner-mark br"></div>

      <!-- Logo -->
      <div class="logo-container">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="16" height="16" fill="#0891B2"/>
          <rect x="22" y="2" width="16" height="16" fill="#0891B2" opacity="0.5"/>
          <rect x="2" y="22" width="16" height="16" fill="#0891B2" opacity="0.3"/>
          <rect x="22" y="22" width="16" height="16" fill="#67E8F9" opacity="0.6"/>
          <rect x="10" y="10" width="8" height="8" fill="#0A0A0A"/>
          <rect x="22" y="10" width="8" height="8" fill="#0A0A0A" opacity="0.6"/>
          <rect x="10" y="22" width="8" height="8" fill="#0A0A0A" opacity="0.4"/>
        </svg>
        <span class="logo-text">TeamFlow<span class="dot">.</span></span>
      </div>

      <!-- Title -->
      <h2 class="form-title">登录到你的工作区</h2>
      <p class="form-subtitle">输入你的账号信息以继续</p>

      <!-- Form -->
      <form onsubmit="return false;" autocomplete="off">
        <!-- Account -->
        <div class="form-group">
          <label class="form-label" for="user_number">账号</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input
              class="form-input"
              type="text"
              id="user_number"
              name="user_number"
              placeholder="请输入账号 / 手机号 / 邮箱"
              autocomplete="off"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="0" ry="0"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="请输入密码"
              autocomplete="off"
              style="padding-right: 48px;"
            />
            <button type="button" class="password-toggle" id="togglePassword" aria-label="切换密码可见性">
              <!-- Eye icon (shown when password is hidden) -->
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye-off icon (shown when password is visible) -->
              <svg id="eyeOffIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Login Button -->
        <button type="submit" class="login-btn">登 录</button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <span>其他方式</span>
      </div>

      <!-- QQ Login -->
      <a href="https://graph.qq.com/oauth2.0/authorize?response_type=code&client_id=1903966421&redirect_uri=https://teamflow.yzgr.top/auth/qq&state=test" target="_blank" class="qq-login">
        <img src="03_qq_symbol.png" alt="QQ" class="qq-icon">
        QQ 扫码登录
      </a>

      <!-- Bottom Links -->
      <div class="bottom-links">
        <a href="#" onclick="return false;">忘记密码？</a>
        <a href="#" class="register-link" onclick="return false;">没有账号？去注册</a>
      </div>
    </div>
  </div>

</div>

<div class="version-tag">TEAMFLOW v2.4.0</div>

<script>
  // Password toggle
  const toggleBtn = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');
  const eyeIcon = document.getElementById('eyeIcon');
  const eyeOffIcon = document.getElementById('eyeOffIcon');

  toggleBtn.addEventListener('click', function() {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    eyeIcon.style.display = isPassword ? 'none' : 'block';
    eyeOffIcon.style.display = isPassword ? 'block' : 'none';
  });

  // Prevent form submission (prototype only)
  document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
  });
</script>

</body>
</html>
